<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen 3D Portfolio</title>
    <meta name="description" content="A classic and attractive 3D portfolio featuring next-generation web design.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=14">
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- ES Module Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.158.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.11?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.88.16?external=react,react-dom,three,@react-three/fiber",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?external=react,react-dom"
      }
    }
    </script>
    
    <!-- Spline Web Component -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.72/build/spline-viewer.js"></script>
</head>
<body>
    <!-- Global HTML Preloader (Shows instantly before React compiles) -->
    <div id="global-loader">
        <div class="loader-spinner"></div>
        <p>INITIALIZING 3D ENVIRONMENT</p>
    </div>

    <div id="root"></div>
    <script type="text/babel" data-type="module" src="./main.jsx?v=14"></script>
</body>
</html>
